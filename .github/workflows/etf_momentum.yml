name: ETF Momentum Push

on:
  schedule:
    - cron: "40 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-etf-momentum:
    runs-on: ubuntu-latest

    env:
      MX_APIKEY: ${{ secrets.MX_APIKEY }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETF momentum script
        run: python etf_momentum.py

      - name: Commit state and report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add etf_lock_state.json etf_momentum_*.md || true
          git diff --cached --quiet || git commit -m "update etf momentum state"
          git push
